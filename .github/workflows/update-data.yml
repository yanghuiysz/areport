name: update-a-share-data

on:
  workflow_dispatch:
  schedule:
    - cron: "35 1 * * 1-5"
    - cron: "5 4 * * 1-5"
    - cron: "5 7 * * 1-5"
    - cron: "30 10 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site data
        run: python -m scripts.build_site_data

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/site
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update market data"
            git push
          fi
