<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A股涨停日报看板</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="wrap">
    <header class="header">
      <h1>A股涨停日报对比</h1>
      <p id="generatedAt" class="sub">数据加载中...</p>
      <button id="refreshBtn" type="button" class="refresh-btn">刷新数据</button>
    </header>

    <section class="chart-row">
      <article class="chart-wrap">
        <h2 class="section-title">涨停/跌停家数趋势</h2>
        <svg id="limitChart" viewBox="0 0 620 280" preserveAspectRatio="none"></svg>
      </article>
      <article class="chart-wrap">
        <h2 class="section-title">上涨/下跌家数趋势</h2>
        <svg id="upDownChart" viewBox="0 0 620 280" preserveAspectRatio="none"></svg>
      </article>
    </section>

    <nav id="tabBar" class="tab-bar"></nav>
    <main id="tabContent" class="tab-content"></main>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
